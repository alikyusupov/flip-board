<section class="modal">
  <nz-table #basicTable [nzShowPagination]="false" nzNoResult="По данному кабинету данные не загружены" [nzData]="listOfData">
      <thead>
        <tr>
          <th>Название АПИ</th>
          <th>Дата обновления</th>
          <th>Последние данные</th>
        </tr>
      </thead>
      <tbody>
        @for (data of basicTable.data; track data) {
          <tr>
            <td>{{ data?.name }}</td>
            <td>{{ data?.update_date }}</td>
            <td>{{ data?.last_data_date }}</td>
          </tr>
        }
      </tbody>
    </nz-table>
</section>
